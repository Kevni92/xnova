name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Abhängigkeiten installieren
        run: npm install --no-audit --no-fund

      - name: Unit-Tests
        id: unit-tests
        continue-on-error: true
        run: npm test > unit-test.log 2>&1

      - name: Unit-Test-Log hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: unit-test.log

      - name: Unit-Test-Ergebnis prüfen
        if: steps.unit-tests.outcome == 'failure'
        run: |
          cat unit-test.log
          exit 1

      - name: Produktions-Build
        run: npm run build

      - name: Browser installieren
        run: npx playwright install --with-deps chromium

      - name: Browser-Test
        run: npm run test:e2e
